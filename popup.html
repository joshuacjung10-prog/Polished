<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        width: 100vw;
        height: 100vh;
        font-family: Arial, sans-serif;
        background: #0f0f0f;
        color: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
      }
      h1 {
        font-size: 26px;
        color: #c9a84c;
        margin-bottom: 4px;
      }
      .subtitle {
        font-size: 13px;
        color: #888;
        margin-bottom: 16px;
      }
      #video-container {
        width: 90%;
        max-width: 800px;
        background: #1a1a1a;
        border-radius: 12px;
        overflow: hidden;
        margin-bottom: 16px;
      }
      video {
        width: 100%;
        display: block;
        border-radius: 12px;
      }
      .controls {
        display: flex;
        gap: 12px;
        width: 90%;
        max-width: 800px;
        margin-bottom: 14px;
      }
      .btn {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 8px;
        font-size: 15px;
        font-weight: bold;
        cursor: pointer;
      }
      .btn-start {
        background: #c9a84c;
        color: #000;
      }
      .btn-start:hover { background: #b8973e; }
      .btn-stop {
        background: #333;
        color: #fff;
        display: none;
      }
      .btn-stop:hover { background: #444; }
      #timer {
        font-size: 13px;
        color: #888;
        margin-bottom: 10px;
        display: none;
      }
      #feedback-box {
        width: 90%;
        max-width: 800px;
        background: #1a1a1a;
        border-radius: 10px;
        padding: 18px;
        font-size: 14px;
        line-height: 1.8;
        color: #ddd;
        display: none;
        flex: 1;
      }
      .status {
        font-size: 13px;
        color: #888;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <h1>Polished ✨</h1>
    <p class="subtitle">Your personal AI confidence coach</p>

    <div id="video-container">
      <video id="video" autoplay muted playsinline></video>
    </div>

    <div class="controls">
      <button class="btn btn-start" id="startBtn">Start Session</button>
      <button class="btn btn-stop" id="stopBtn">End Session</button>
    </div>

    <div id="timer">Session time: <span id="time">0:00</span></div>
    <div id="feedback-box"></div>
    <p class="status" id="status">Click start to begin your session</p>

    <script src="popup.js"></script>
  </body>
</html>
