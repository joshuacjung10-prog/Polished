<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        width: 420px;
        height: 600px;
        margin: 0;
        padding: 20px;
        font-family: Arial, sans-serif;
        background: #0f0f0f;
        color: #ffffff;
        box-sizing: border-box;
      }
      h1 {
        font-size: 22px;
        color: #c9a84c;
        margin-bottom: 4px;
      }
      .subtitle {
        font-size: 12px;
        color: #888;
        margin-bottom: 16px;
      }
      #video-container {
        position: relative;
        width: 100%;
        background: #1a1a1a;
        border-radius: 10px;
        overflow: hidden;
        margin-bottom: 14px;
      }
      video {
        width: 100%;
        border-radius: 10px;
        display: block;
      }
      .btn {
        width: 100%;
        padding: 11px;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        margin-bottom: 10px;
      }
      .btn-start {
        background: #c9a84c;
        color: #000;
      }
      .btn-start:hover {
        background: #b8973e;
      }
      .btn-stop {
        background: #333;
        color: #fff;
        display: none;
      }
      .btn-stop:hover {
        background: #444;
      }
      #timer {
        text-align: center;
        font-size: 13px;
        color: #888;
        margin-bottom: 10px;
        display: none;
      }
      #feedback-box {
        background: #1a1a1a;
        border-radius: 8px;
        padding: 14px;
        font-size: 13px;
        line-height: 1.7;
        min-height: 80px;
        color: #ddd;
        display: none;
      }
      .status {
        font-size: 12px;
        color: #888;
        text-align: center;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <h1>Polished ✨</h1>
    <p class="subtitle">Your personal AI confidence coach</p>

    <div id="video-container">
      <video id="video" autoplay muted playsinline></video>
    </div>

    <button class="btn btn-start" id="startBtn">Start Session</button>
    <button class="btn btn-stop" id="stopBtn">End Session</button>

    <div id="timer">Session time: <span id="time">0:00</span></div>

    <div id="feedback-box" id="feedback"></div>

    <p class="status" id="status">Click start to begin your session</p>

    <script src="popup.js"></script>
  </body>
</html>
