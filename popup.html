<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        width: 100vw;
        height: 100vh;
        font-family: Arial, sans-serif;
        background: #0d1117;
        color: #ffffff;
        display: flex;
        flex-direction: column;
        padding: 16px;
        gap: 12px;
      }
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .logo {
        font-size: 20px;
        font-weight: 700;
        color: #58a6ff;
      }
      .session-timer {
        font-size: 13px;
        color: #8b949e;
        display: none;
      }
      .score-cards {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }
      .card {
        background: #161b22;
        border-radius: 10px;
        padding: 12px;
        text-align: center;
        border: 0.5px solid #30363d;
      }
      .card-label {
        font-size: 11px;
        color: #58a6ff;
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .card-score {
        font-size: 28px;
        font-weight: 700;
        color: #ffffff;
      }
      .card-score.good { color: #3fb950; }
      .card-score.mid { color: #d29922; }
      .card-score.low { color: #f85149; }
      .main {
        display: flex;
        gap: 12px;
        flex: 1;
        min-height: 0;
      }
      .camera-panel {
        flex: 1;
        background: #161b22;
        border-radius: 10px;
        border: 0.5px solid #30363d;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 10px;
      }
      .feedback-panel {
        flex: 1;
        background: #161b22;
        border-radius: 10px;
        border: 0.5px solid #30363d;
        padding: 14px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .feedback-panel-title {
        font-size: 12px;
        color: #8b949e;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        border-bottom: 0.5px solid #30363d;
        padding-bottom: 8px;
      }
      .feedback-entry {
        background: #0d1117;
        border-radius: 8px;
        padding: 10px 12px;
        font-size: 13px;
        line-height: 1.7;
        color: #c9d1d9;
        border-left: 2px solid #58a6ff;
      }
      .feedback-time {
        font-size: 11px;
        color: #8b949e;
        margin-bottom: 4px;
      }
      .empty-state {
        font-size: 13px;
        color: #8b949e;
        text-align: center;
        margin: auto;
      }
      .controls {
        display: flex;
        gap: 10px;
      }
      .btn {
        flex: 1;
        padding: 11px;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
      }
      .btn-start {
        background: #1f6feb;
        color: #fff;
      }
      .btn-start:hover { background: #388bfd; }
      .btn-stop {
        background: #21262d;
        color: #fff;
        display: none;
      }
      .btn-stop:hover { background: #30363d; }
      .status {
        font-size: 12px;
        color: #8b949e;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="logo" style="display:flex; align-items:center; gap:8px;">
  <svg width="28" height="28" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="36" cy="36" r="32" fill="#1f6feb" fill-opacity="0.06" stroke="#1f6feb" stroke-width="1.5" stroke-opacity="0.3"/>
    <circle cx="36" cy="36" r="26" fill="none" stroke="#58a6ff" stroke-width="0.5" stroke-opacity="0.2"/>
    <polygon points="36,10 58,28 36,62 14,28" fill="#0d1117"/>
    <polygon points="36,10 58,28 36,62 14,28" fill="none" stroke="#58a6ff" stroke-width="1.8"/>
    <polygon points="36,10 58,28 36,28" fill="#1f6feb" fill-opacity="0.55"/>
    <polygon points="36,10 14,28 36,28" fill="#1f6feb" fill-opacity="0.2"/>
    <polygon points="14,28 36,28 36,62" fill="#1f6feb" fill-opacity="0.08"/>
    <polygon points="58,28 36,28 36,62" fill="#1f6feb" fill-opacity="0.18"/>
    <line x1="14" y1="28" x2="58" y2="28" stroke="#88c8ff" stroke-width="1"/>
    <line x1="36" y1="10" x2="36" y2="28" stroke="#88c8ff" stroke-width="1" stroke-opacity="0.7"/>
    <line x1="36" y1="28" x2="36" y2="62" stroke="#58a6ff" stroke-width="0.6" stroke-opacity="0.3"/>
    <polygon points="36,10 49,20 36,20" fill="white" fill-opacity="0.55"/>
  </svg>
  Polished
</div>
      <div class="session-timer" id="timer">Session: <span id="time">0:00</span></div>
    </div>

    <div class="score-cards">
      <div class="card">
        <div class="card-label">Posture</div>
        <div class="card-score" id="score-posture">--</div>
      </div>
      <div class="card">
        <div class="card-label">Expression</div>
        <div class="card-score" id="score-expression">--</div>
      </div>
      <div class="card">
        <div class="card-label">Voice</div>
        <div class="card-score" id="score-voice">--</div>
      </div>
    </div>

    <div class="main">
      <div class="camera-panel">
        <video id="video" autoplay muted playsinline></video>
      </div>
      <div class="feedback-panel" id="feedback-panel">
        <div class="feedback-panel-title">Coach Feedback</div>
        <div class="empty-state" id="empty-state">Start a session to receive feedback</div>
      </div>
    </div>

    <div class="controls">
      <button class="btn btn-start" id="startBtn">Start Session</button>
      <button class="btn btn-stop" id="stopBtn">End Session</button>
    </div>

    <p class="status" id="status">Click start to begin your session</p>

    <script src="popup.js"></script>
  </body>
</html>
